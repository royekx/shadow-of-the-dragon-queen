<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bakaris the Younger · Dossiers</title>
  <link rel="stylesheet" href="../../styles/sotdq.css" />
  <script src="../../scripts/nav.js" defer></script>
  <style>
    .page-header {
      padding: 2.5rem 3rem 2rem;
      border-bottom: 1px solid var(--border-lit);
    }
    .page-header::after {
      content: '';
      display: block;
      width: 60px;
      height: 2px;
      background: var(--crimson);
      margin-top: 1.5rem;
    }
    .content {
      padding: 2.5rem 3rem;
      max-width: 900px;
    }
    .section {
      margin: 2.5rem 0;
    }
    .section-title {
      font-family: var(--font-display);
      font-size: var(--sz-md);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text);
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border-lit);
    }
    .dossier-badge {
      display: inline-block;
      padding: 0.3rem 0.8rem;
      background: rgba(139,26,26,.08);
      border: 1px solid rgba(139,26,26,.5);
      color: #8b1a1a;
      font-size: var(--sz-xs);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }
    p {
      font-size: var(--sz-sm);
      line-height: 1.8;
      margin-bottom: 1.25rem;
      color: var(--text-dim);
    }
    strong {
      color: var(--text);
      font-weight: 600;
    }
    @media (max-width: 768px) {
      .page-header, .content { padding-left: 1.25rem; padding-right: 1.25rem; }
    }
  </style>
</head>
<body>

  <div class="page-header">
    <div class="page-eyebrow">Dossier</div>
    <h1 class="page-title">Bakaris the Younger</h1>
    <p class="page-subtitle">Dragon Army Officer</p>
  </div>

  <div class="content">

    <div class="dossier-badge">Threat · Alive</div>

    <div class="section">
      <div class="section-title">Background</div>
      <p>Coming soon. This dossier will be filled in as the campaign reveals more about this character.</p>
    </div>

    <div class="section">
      <div class="section-title">Role in the Campaign</div>
      <p>Coming soon.</p>
    </div>

  </div>

</body>
</html>
