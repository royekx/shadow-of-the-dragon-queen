<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unexpected Journeys · Shadow of the Dragon Queen</title>
  <link rel="stylesheet" href="../styles/sotdq.css" />
  <script src="../data/journeys.js"></script>
  <script src="../scripts/nav.js" defer></script>
</head>
<body>

  <div class="page-content">

    <div class="page-header">
      <div class="page-eyebrow">Campaign Chronicle</div>
      <h1 class="page-title">Unexpected Journeys</h1>
      <p class="page-subtitle">Nine sessions. Countless moments. The full chronicle of The Embers' rise from strangers to legends.</p>
    </div>

    <div class="journey-listing">
      <table class="journey-table">
        <tbody id="journey-tbody">
          <!-- Populated by JavaScript from data/journeys.js -->
        </tbody>
      </table>
    </div>

  </div>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (typeof SOTDQ_JOURNEYS === 'undefined' || SOTDQ_JOURNEYS.length === 0) {
        console.error('SOTDQ_JOURNEYS not loaded');
        return;
      }

      const tbody = document.getElementById('journey-tbody');
      tbody.innerHTML = '';

      // journeys.js stores root-relative paths ('unexpected-journeys/...')
      // This page is already inside unexpected-journeys/, so strip that prefix
      function localPath(p) {
        return p.replace(/^unexpected-journeys\//, '');
      }

      SOTDQ_JOURNEYS.forEach(journey => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td class="journey-num">${journey.num}</td>
          <td class="journey-title">${journey.title}</td>
          <td class="journey-brief">
            <a href="${localPath(journey.brief)}" class="journey-btn journey-brief-btn">Brief Account</a>
          </td>
          <td class="journey-full">
            <a href="${localPath(journey.full)}" class="journey-btn journey-full-btn">Full Account</a>
          </td>
        `;
        tbody.appendChild(row);
      });
    });
  </script>

</body>
</html>
