<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Embers · Shadow of the Dragon Queen</title>
  <link rel="stylesheet" href="../styles/sotdq.css" />
  <script src="../scripts/nav.js" defer></script>
  <style>
    .page-content {
      max-width: 100%;
      margin: 0;
    }

    .content {
      max-width: 100%;
      margin: 0;
    }

    .page-header {
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
      padding: 0 3rem;
    }

    .page-header::after {
      content: '';
      display: block;
      width: 80px;
      height: 1px;
      background: var(--bronze-dim);
      margin: 1.5rem auto 0;
    }

    .roster {
      max-width: 1100px;
      margin: 3rem auto;
      padding: 0 3rem;
    }

    .character-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 2rem;
      margin: 2rem 0;
    }

    .character-card {
      background: rgba(139, 26, 26, 0.04);
      border: 1px solid var(--border-lit);
      overflow: hidden;
      transition: all 0.2s;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
    }

    .character-card:hover {
      background: rgba(139, 26, 26, 0.08);
      border-color: var(--crimson-lit);
    }

    .character-portrait {
      width: 100%;
      height: 280px;
      background: rgba(139, 26, 26, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .character-portrait img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .character-info {
      padding: 1.5rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .character-name {
      font-family: var(--font-display);
      font-size: 1rem;
      letter-spacing: 0.05em;
      color: var(--text);
      margin: 0 0 0.3rem;
    }

    .character-class {
      font-size: 0.8rem;
      color: var(--text-dim);
      margin: 0 0 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .character-status {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      background: rgba(139, 26, 26, 0.2);
      border: 1px solid rgba(139, 26, 26, 0.5);
      color: var(--crimson-lit);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.8rem;
      width: fit-content;
    }

    .character-desc {
      font-size: 0.9rem;
      line-height: 1.5;
      color: var(--text-dim);
      flex: 1;
    }

    @media (max-width: 768px) {
      .page-header,
      .roster {
        padding: 0 1.2rem;
      }

      .character-grid {
        grid-template-columns: 1fr;
        gap: 1.5rem;
      }
    }
  </style>
</head>
<body>

  <div class="page-content">

    <div class="page-header">
      <div class="page-eyebrow">Party Members</div>
      <h1 class="page-title">The Embers</h1>
      <p class="page-subtitle">Five strangers who became allies. An old friend. A cousin returned. Together, they carry the light against the dark.</p>
    </div>

    <div class="roster">
      <div class="character-grid" id="character-grid">
        <!-- Populated by JavaScript -->
      </div>
    </div>

  </div>

  <script>
    const characters = [
      {
        name: 'Aratos Stormblessed',
        class: 'Barbarian',
        status: 'Active',
        desc: 'Driven by thunder and conviction. Marked by visions of the Shadow Queen, compelled to fight.',
        url: 'aratos.html',
        portrait: 'https://lh3.googleusercontent.com/d/1FocmkAQsG7XDRJPrGZMtQerhkHxSvYNV'
      },
      {
        name: 'Kakashi',
        class: 'Wizard',
        status: 'Active',
        desc: 'Curious mind, cautious heart. A scholar of magic seeking understanding in a changing world.',
        url: 'kakashi.html',
        portrait: 'https://lh3.googleusercontent.com/d/1USG7Cr8dArWVq8HCEe99o3IQMOBCD26K'
      },
      {
        name: 'Jasper Quickwit',
        class: 'Rogue',
        status: 'Active',
        desc: 'Quick wit hides sharper steel. A thief with hidden depths and dangerous secrets.',
        url: 'jasper.html',
        portrait: 'https://lh3.googleusercontent.com/d/1zX6MfbMgXijkdr9IOJLbGnWdMS3wtoR1'
      },
      {
        name: 'Roshi',
        class: 'Paladin of Kiri-Jolith',
        status: 'Active',
        desc: 'Humble strength in humble hands. A warrior devoted to honor and protection.',
        url: 'roshi.html',
        portrait: 'https://lh3.googleusercontent.com/d/1aY9zew4XAuhOWbXfOB2Vfm7FKDzfZonc'
      },
      {
        name: 'Mayriel',
        class: 'Cleric of Paladine',
        status: 'Active',
        desc: 'Faith made flesh and shield. A healer and warrior touched by divine purpose.',
        url: 'mayriel.html',
        portrait: 'https://lh3.googleusercontent.com/d/1VKa7NEkNHE6cGsNfNBckPyjOvvKLPrkM'
      },
      {
        name: 'Aeimos Stormblessed',
        class: 'Monk',
        status: 'Companion',
        desc: 'Discipline walks in silence. A cousin of Aratos, skilled in the martial way.',
        url: 'aeimos.html',
        portrait: 'https://lh3.googleusercontent.com/d/1w3IJDFGxZ_6JXPW_VvgMjb-e6iOZSHTK'
      }
    ];

    const grid = document.getElementById('character-grid');
    characters.forEach(char => {
      const card = document.createElement('a');
      card.href = char.url;
      card.className = 'character-card';
      card.innerHTML = `
        <div class="character-portrait">
          <img src="${char.portrait}" alt="${char.name}" onerror="this.style.display='none'">
        </div>
        <div class="character-info">
          <h2 class="character-name">${char.name}</h2>
          <div class="character-class">${char.class}</div>
          <div class="character-status">${char.status}</div>
          <p class="character-desc">${char.desc}</p>
        </div>
      `;
      grid.appendChild(card);
    });
  </script>

</body>
</html>
